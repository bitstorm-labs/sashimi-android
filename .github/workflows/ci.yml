name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew ktlintCheck

      - name: Unit tests
        run: ./gradlew :core:test

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    name: Release AAB + signed APK
    # Only on version tags. Signing secrets are optional-guarded: the release
    # build falls back to unsigned when they are absent, so the job stays green
    # even before the keystore secrets are configured.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode upload keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SASHIMI_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.jks"
            echo "path=$RUNNER_TEMP/upload.jks" >> "$GITHUB_OUTPUT"
          else
            echo "No keystore secret configured — building unsigned."
          fi

      - name: Build AAB + APK
        env:
          SASHIMI_UPLOAD_STORE_FILE: ${{ steps.keystore.outputs.path }}
          SASHIMI_UPLOAD_STORE_PASSWORD: ${{ secrets.SASHIMI_UPLOAD_STORE_PASSWORD }}
          SASHIMI_UPLOAD_KEY_ALIAS: ${{ secrets.SASHIMI_UPLOAD_KEY_ALIAS }}
          SASHIMI_UPLOAD_KEY_PASSWORD: ${{ secrets.SASHIMI_UPLOAD_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease :app:assembleRelease

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sashimi-release
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error
