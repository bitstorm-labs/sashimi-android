name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew ktlintCheck

      - name: Unit tests
        run: ./gradlew :core:test

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    name: Release AAB + signed APK
    # Only on version tags. Signing secrets are optional-guarded: the release
    # build falls back to unsigned when they are absent, so the job stays green
    # even before the keystore secrets are configured.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode upload keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.SASHIMI_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.jks"
            echo "path=$RUNNER_TEMP/upload.jks" >> "$GITHUB_OUTPUT"
          else
            echo "No keystore secret configured — building unsigned."
          fi

      - name: Build AAB + APK
        env:
          SASHIMI_UPLOAD_STORE_FILE: ${{ steps.keystore.outputs.path }}
          SASHIMI_UPLOAD_STORE_PASSWORD: ${{ secrets.SASHIMI_UPLOAD_STORE_PASSWORD }}
          SASHIMI_UPLOAD_KEY_ALIAS: ${{ secrets.SASHIMI_UPLOAD_KEY_ALIAS }}
          SASHIMI_UPLOAD_KEY_PASSWORD: ${{ secrets.SASHIMI_UPLOAD_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease :app:assembleRelease

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sashimi-release
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error

      # Sideload distribution: attach the APK to a GitHub Release for the tag
      # (pattern from sappho-android's build-release workflow).
      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release*.apk
          generate_release_notes: true

      # Play internal-testing deploy via fastlane (pipeline ported from
      # sappho-android). Optional-guarded: skips cleanly until the
      # PLAY_STORE_JSON_KEY secret (base64 service-account JSON) is added.
      - name: Decode Play Store key
        id: playkey
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: |
          if [ -n "$PLAY_STORE_JSON_KEY" ]; then
            echo "$PLAY_STORE_JSON_KEY" | base64 --decode > "$RUNNER_TEMP/play-store-key.json"
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "No PLAY_STORE_JSON_KEY secret — skipping Play deploy."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Play internal testing
        if: steps.playkey.outputs.present == 'true'
        env:
          PLAY_STORE_JSON_KEY_PATH: ${{ runner.temp }}/play-store-key.json
        run: |
          sudo gem install fastlane --no-document
          fastlane internal

      - name: Cleanup Play key
        if: always()
        run: rm -f "$RUNNER_TEMP/play-store-key.json"
